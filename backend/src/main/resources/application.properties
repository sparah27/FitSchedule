# === Database ===
spring.datasource.url=jdbc:mysql://localhost:3306/fitschedule?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# === JPA / Hibernate ===
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# === Flyway ===
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# === Server ===
server.port=8080

# 1 day JWT expiration
app.jwt.secret=fitschedule-super-secret-key-must-be-at-least-256-bits-long-for-hmac-sha256-signing
app.jwt.expiration-ms=86400000

# === Swagger ===
springdoc.swagger-ui.path=/swagger-ui.html

logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG